name: "SAST: tfsec"

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tfsec:
    name: tfsec scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true
