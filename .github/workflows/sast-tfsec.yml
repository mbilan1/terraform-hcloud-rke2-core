name: "SAST: tfsec"

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tfsec:
    name: tfsec scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true
