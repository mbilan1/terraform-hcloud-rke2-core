name: "SAST: KICS"

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  kics:
    name: KICS scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run KICS
        uses: Checkmarx/kics-github-action@v2.1.3
        with:
          path: .
          type: Terraform
          fail_on: high
          output_formats: json
          exclude_queries: "e38a8e0a-b88b-4902-b3fe-b0571e3c97ec"
