name: "Lint: fmt"

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fmt:
    name: tofu fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1.0.8
      - run: tofu fmt -check -recursive
